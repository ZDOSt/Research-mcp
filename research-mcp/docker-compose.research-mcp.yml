services:
  research-mcp:
    container_name: research-mcp
    build:
      context: ./research-mcp
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
      - CRAWL4AI_BASE_URL=http://crawl4ai:11235
      - RERANKER_BASE_URL=http://reranker:8010
      - REQUEST_TIMEOUT=120
    depends_on:
      - searxng
      - crawl4ai
      - reranker
    networks:
      - app-network
